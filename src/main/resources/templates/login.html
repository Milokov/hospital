<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hospital</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="auth-card">
        <h1>Hospital</h1>
        <p class="muted">Gestion de consultas medicas</p>

        <div class="alert error" th:if="${param.error}">Usuario o contrasena incorrectos.</div>
        <div class="alert success" th:if="${param.logout}">Sesion cerrada correctamente.</div>

        <form th:action="@{/login}" method="post" class="form">
            <label>
                Usuario
                <input type="text" name="username" autocomplete="username" required>
            </label>
            <label>
                Contrasena
                <input type="password" name="password" autocomplete="current-password" required>
            </label>
            <button type="submit">Ingresar</button>
        </form>

        <div class="demo-users">
            <strong>Usuarios de prueba</strong>
            <span>Administrador: admin / admin123</span>
            <span>Medico: medico / medico123</span>
            <span>Paciente: paciente / paciente123</span>
        </div>
    </section>
</main>
</body>
</html>
